<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="form-container">

        <div class="title">Club Sign-Up Form</div>
        <br>

        <form id="clubForm" method="post" action="submit" onsubmit="submit()" onreset="reset()">
            <label for="studentid">Student ID: </label>
            <input type="number" id="studentid">
            <br><br>
            <label for="name">Full Name: </label>
            <input type="text" id="name" placeholder="Given M.I. Last">
            <br><br>
            <label for="dob">Date of Birth: </label>
            <input type="date" id="dob">
            <br><br>
            <label for="email">Email Address: </label>
            <input type="email" id="email">
            <br><br>
            <label for="phone">Phone Number: </label>
            <input type="tel" id="phone">
            <br><br>
            <label for="gradelevel">Grade Level: </label>
            <select name="gradelevel" id="gradelevel">
                <option value="">Select Grade Level</option>
                <option value="g7">Grade 7</option>
                <option value="g8">Grade 8</option>
                <option value="g9">Grade 9</option>
                <option value="g10">Grade 10</option>
                <option value="g11">Grade 11</option>
                <option value="g12">Grade 12</option>
            </select>
            <br><br>
            <fieldset>
                <legend>Intern or Extern: </legend>
    
                <label for="intern">Intern</label>
                <input type="radio" name="intorext" id="intern" value="intern">
    
                <label for="extern">Extern</label>
                <input type="radio" name="intorext" id="extern" value="extern">
    
            </fieldset>
            <br><br>
            <label for="club">Preferred Club: </label>
            <select name="gradelevel" id="gradelevel">
                <option value="">Select Club</option>
                <option value="club1">Computron</option>
                <option value="club2">Tomorrow</option>
                <option value="club3">Likha</option>
                <option value="club4">SARS+</option>
                <option value="club5">Polvere</option>
            </select>
            <br><br>
            <label for="reason">Reason for Interest: </label>
            <textarea style="resize: none;" id="reason" rows="4" cols="67"></textarea>
            <br><br>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </form>
    </div>
</body>
<script src="script.js"></script>
</html>
