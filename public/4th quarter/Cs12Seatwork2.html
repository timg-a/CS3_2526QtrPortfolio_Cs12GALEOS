<!DOCTYPE html>
<html>
<head>
  <meta name="author" content="<your names>" />
  <meta name="revised" content="<date today>" />
  <style>
    body { font-family: Arial, sans-serif; }
    .header, .footer {
      background: lightblue;
      padding: 10px;
    }
    .footer {
       position: fixed;
       opacity: 0.5;
       bottom: 0;
       width: 100%;
    }
    .sidebar {
      position: relative;
      background: lightgreen;
      width: 150px;
      height: 200px;
      top: 20px;
      left: 20px;
    }
    .content {
      position: absolute;
      background: lightyellow;
      width: 300px;
      height: 200px;
      top: 66px;
      left: 200px;
      z-index: 1;
    }

    .notice {
      position: absolute;
      top: 60px;
      left: 400px; /* 95% for top right */
      background: orange;
      padding: 10px;
      z-index: 2;
}
  </style>
</head>
<body>
  <div class="header">Header</div>
  <div class="sidebar">Sidebar</div>
  <div class="content">Main Content</div>
  <div class="footer">Footer</div>
  <div class="notice">Notice!</div>
</body>
</html>
